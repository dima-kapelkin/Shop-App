<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Store</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
</head>
<body>

<div class="container">

    <!-- Каталог -->
    <main class="catalog" id="catalog">

    </main>

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Корзина</h2>
        <div class="cart-items" id="cartItems"></div>

        <div class="cart-total" id="cartTotal">
           Итого: $0.00
        </div>

        <button class="go-to-cart-btn" onclick="window.location.href='cart.html'">
           Перейти в корзину
        </button>
    </aside>

</div>

<!-- ===== Modal ===== -->

<div class="modal-overlay" id="modal">
    <div class="modal">
        <span class="modal-close" id="modalClose">&times;</span>
        <img id="modalImg" src="" alt="">
        <h2 id="modalTitle"></h2>
        <p id="modalSubtitle" class="subtitle"></p>
        <p class="modal-description" id="modalDescription"></p>
        <div class="price-row">
            <span id="modalPrice"></span>
            <button class="cart-btn" id="modalAddToCart">Добавить в корзину</button>
        </div>
    </div>
</div>


<script type="module" src="js/controller.js"></script>


</body>
</html>
