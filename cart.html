<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="shortcut icon" href="icon.png" type="image/x-icon">
    <title>Cart</title>
</head>
<body>
  <div class="container">
    <main class="cart-page">
        <h1>Корзина</h1>

        <div id="cartPageItems" class="cart-grid"></div>

        <h2 id="cartPageTotal"></h2>

        <button id="checkoutBtn">Оформить заказ</button>
    </main>
</div>

<div id="orderModal" class="modal-overlay">
  <div class="modal">
    <span id="closeOrderModal">&times;</span>

    <h2>Оформление заказа</h2>

    <input id="firstName" placeholder="Имя">
    <input id="lastName" placeholder="Фамилия">
    <input id="address" placeholder="Адрес">
    <input id="phone" placeholder="Телефон">

    <button id="submitOrder">Оформить</button>
  </div>
</div>

<script type="module" src="js/controller.js"></script>
</body>
</html>
